# --- Font settings ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12

# --- Clipboard shortcuts ---
map ctrl+c copy_to_clipboard
map ctrl+v paste_from_clipboard

# --- Interrupt shortcut (SIGINT) ---
map ctrl+alt+c send_text all \x03